apiVersion: kafka.axentx.io/v1
kind: KafkaTopic
metadata:
  name: existing-topic
spec:
  partitions: 10
  replicationFactor: 3
  brokerPool:
    dedicated:
      - broker-1
      - broker-2
      - broker-3
  config:
    retention.ms: 86400000
    message.format.version: "2.8"
  reconciliation:
    strategy: update
    updateConfig:
      retention.ms: 604800000