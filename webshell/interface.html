<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Shell</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --output-bg: #000;
      --text: #d4d4d4;
      --prompt: #9cdcfe;
      --error: #f66;
      --success: #0f0;
    }
    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
    }
    #output {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
      background: var(--output-bg);
      white-space: pre-wrap;
    }
    #input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      background: var(--bg);
      color: var(--text);
      border: none;
      font-size: 1rem;
    }
    #input:focus { outline: none; }
  </style>
</head>
<body>
  <div id="output"></div>
  <input id="input" type="text" placeholder="Enter command…" autocomplete="off" />
  <script src="interface.js"></script>
</body>
</html>
