openapi: 3.0.0
info:
  title: Surrogate-1 Mappings API
  description: API for managing service mappings in the surrogate-1 system
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Development server
paths:
  /mappings:
    get:
      summary: List all service mappings
      description: Returns a list of all current service mappings
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: A JSON array of service mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceMapping'
    post:
      summary: Add a new service mapping
      description: Adds a new service mapping to the system
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceMapping'
      responses:
        '201':
          description: Service mapping created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceMapping'
  /mappings/{service_name}:
    delete:
      summary: Remove a service mapping
      description: Removes a service mapping from the system
      security:
        - apiKeyAuth: []
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Service mapping deleted successfully
components:
  schemas:
    ServiceMapping:
      type: object
      properties:
        service_name:
          type: string
          description: The name of the service
        target_url:
          type: string
          description: The URL to map the service to
        description:
          type: string
          description: A description of the service mapping
      required:
        - service_name
        - target_url
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY