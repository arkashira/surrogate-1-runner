<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Drift Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Signature Drift Monitor</h1>

    <div class="controls">
        <label for="severityFilter">Severity:</label>
        <select id="severityFilter">
            <option value="all">All</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <label for="sortOrder">Sort by:</label>
        <select id="sortOrder">
            <option value="timestamp_desc">Timestamp (newest)</option>
            <option value="timestamp_asc">Timestamp (oldest)</option>
            <option value="severity_desc">Severity (high → low)</option>
            <option value="severity_asc">Severity (low → high)</option>
        </select>
    </div>

    <table id="driftTable">
        <thead>
            <tr>
                <th>Signature ID</th>
                <th>Severity</th>
                <th>Timestamp</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows populated by JavaScript -->
        </tbody>
    </table>

    <div id="error" class="error"></div>

    <script src="app.js"></script>
</body>
</html>
