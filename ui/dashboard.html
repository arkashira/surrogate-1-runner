<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contract Changes Dashboard</title>

    <!-- Optional external stylesheet (you can add more styling there) -->
    <link rel="stylesheet" href="/static/css/dashboard.css">

    <!-- Inline CSS for the core layout – can be moved to dashboard.css later -->
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 20px; }
        h1   { margin-bottom: 0.5rem; }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: baseline;
            margin-bottom: 1.5rem;
        }
        .filter-group label { margin-right: 0.25rem; }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            vertical-align: top;
        }
        th { background:#f4f4f4; text-align: left; }
        .diff {
            white-space: pre-wrap;
            font-family: monospace;
            background:#fafafa;
            padding:10px;
            border:1px solid #e0e0e0;
            overflow-x:auto;
        }
        .no-data { text-align:center; color:#777; }
    </style>

    <!-- Dashboard logic -->
    <script src="/static/js/dashboard.js" defer></script>
</head>
<body>
    <h1>Contract Changes Dashboard</h1>

    <div class="filter-group">
        <label for="serviceFilter">Service:</label>
        <select id="serviceFilter">
            <option value="">All</option>
        </select>

        <label for="typeFilter">Change Type:</label>
        <select id="typeFilter">
            <option value="">All</option>
            <option value="add">Add</option>
            <option value="update">Update</option>
            <option value="remove">Remove</option>
        </select>

        <label for="dateFrom">From:</label>
        <input type="date" id="dateFrom">

        <label for="dateTo">To:</label>
        <input type="date" id="dateTo">

        <button id="applyFilters">Apply</button>
    </div>

    <table id="changesTable">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Service</th>
                <th>Type</th>
                <th>Contract ID</th>
                <th>Diff</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows are injected by dashboard.js -->
        </tbody>
    </table>
</body>
</html>
