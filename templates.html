<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signature Drift Alert</title>
  <style>
    /* Basic reset & layout */
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background:#f5f5f5; }
    .alert { max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 6px; background:#fff; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .alert .header { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; }
    .alert .detail { margin: 6px 0; }
    .alert .detail strong { margin-right: 6px; }
    .alert .timestamp { color:#777; font-size: .9rem; }
    /* Responsive tweak */
    @media (max-width: 480px) { .alert { margin: 20px; } }
  </style>
</head>
<body>
  <div class="alert" id="alert-container">
    <div class="header">Signature Drift Detected</div>
    <div class="detail"><span class="timestamp" id="alert-timestamp"></span></div>
    <div class="detail"><strong>Pipeline:</strong> <span id="alert-pipeline"></span></div>
    <div class="detail"><strong>Affected API:</strong> <span id="alert-api"></span></div>
  </div>

  <script src="js.js"></script>
</body>
</html>
