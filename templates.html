<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workflow Templates</title>
</head>
<body>
    <h1>Manage Workflow Templates</h1>
    <h2>Create New Template</h2>
    <form method="post">
        <label for="template_name">Template Name:</label><br>
        <input type="text" id="template_name" name="name" required><br>
        <label for="template_description">Description:</label><br>
        <textarea id="template_description" name="description" rows="4" required></textarea><br>
        <button type="submit">Create Template</button>
    </form>
    <hr>
    <h2>Existing Templates</h2>
    <ul>
        {% for template in templates %}
            <li>
                <h3>{{ template.name }}</h3>
                <p>{{ template.description }}</p>
                <ul>
                    {% for step in template.steps %}
                        <li>{{ step }}</li>
                    {% endfor %}
                </ul>
                <a href="{{ url_for('edit_template', id=template.id) }}">Edit</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
