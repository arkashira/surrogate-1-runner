# Sample OpenZeppelin Security Checklist mapping.
# This file provides a minimal reference mapping between rule identifiers
# used by the scanner and the corresponding OpenZeppelin checklist items.
# It is consumed by the export logic to populate the top‑level `checklist`
# field in the generated JSON report.

checklist:
  - rule_id: "OZ001"
    title: "Reentrancy"
    description: "Functions must be protected against reentrancy attacks (e.g., using checks‑effects‑interactions pattern or ReentrancyGuard)."
    severity: "high"
  - rule_id: "OZ002"
    title: "Access Control"
    description: "All privileged functions should enforce proper access control (e.g., onlyOwner, role‑based access)."
    severity: "high"
  - rule_id: "OZ003"
    title: "Integer Overflow/Underflow"
    description: "Use SafeMath or built‑in overflow checks (Solidity ^0.8.0) for arithmetic operations."
    severity: "medium"
  - rule_id: "OZ004"
    title: "Unchecked External Calls"
    description: "Validate return values and handle failures when making low‑level calls (call, delegatecall, staticcall)."
    severity: "high"
  - rule_id: "OZ005"
    title: "Timestamp Dependence"
    description: "Avoid using block.timestamp for critical logic; it can be manipulated by miners."
    severity: "low"
  - rule_id: "OZ006"
    title: "Denial of Service (DoS) via Block Gas Limit"
    description: "Do not rely on loops that can exceed the block gas limit; use pull‑payment patterns."
    severity: "medium"
  - rule_id: "OZ007"
    title: "Front‑Running"
    description: "Guard against transaction ordering attacks, especially in price‑oracles or auction contracts."
    severity: "medium"
  - rule_id: "OZ008"
    title: "Improper Randomness"
    description: "Do not use block variables for randomness; employ VRF or commit‑reveal schemes."
    severity: "medium"
  - rule_id: "OZ009"
    title: "Delegatecall Injection"
    description: "Restrict delegatecall usage to trusted contracts; validate target addresses."
    severity: "high"
  - rule_id: "OZ010"
    title: "Missing Events"
    description: "Emit events for all state‑changing external functions to aid in off‑chain monitoring."
    severity: "low"