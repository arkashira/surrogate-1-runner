name: Ingest

on:
  schedule:
    - cron: 0 0/30 * * * *

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run dataset-enrich.sh
        run: |
          bash dataset-enrich.sh
      - name: Upload output
        uses: actions/upload-artifact@v3
        with:
          name: output
          path: batches/public-merged/${DATE_PARTITION}