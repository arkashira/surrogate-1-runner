<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback on Recommendation</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .feedback-form { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        textarea { resize: vertical; min-height: 100px; }
        .rating { display: flex; gap: 10px; margin-top: 10px; }
        .rating label { display: flex; align-items: center; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h1>Provide Feedback on This Recommendation</h1>
    <p>Please share your thoughts about this recommendation to help us improve our system.</p>
    
    <form method="post" action="{{ url_for('submit_feedback') }}">
        <input type="hidden" name="recommendation_id" value="{{ recommendation.id }}">
        <input type="hidden" name="user_id" value="{{ current_user.id }}">
        
        <div class="form-group">
            <label for="feedback_text">Your Feedback:</label>
            <textarea id="feedback_text" name="feedback_text" required></textarea>
        </div>
        
        <div class="form-group">
            <label>Rating:</label>
            <div class="rating">
                <label><input type="radio" name="rating" value="1" id="rating1"> 1 - Poor</label>
                <label><input type="radio" name="rating" value="2" id="rating2"> 2 - Fair</label>
                <label><input type="radio" name="rating" value="3" id="rating3"> 3 - Good</label>
                <label><input type="radio" name="rating" value="4" id="rating4"> 4 - Very Good</label>
                <label><input type="radio" name="rating" value="5" id="rating5"> 5 - Excellent</label>
            </div>
        </div>
        
        <button type="submit">Submit Feedback</button>
    </form>
</body>
</html>
