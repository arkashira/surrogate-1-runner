AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance for the practice environment.

Parameters:
  EnvironmentName:
    Type: String
    Description: Name prefix for all resources.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from VPC stack.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of public subnet IDs.
  InstanceProfile:
    Type: String
    Description: IAM Instance Profile name.

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP for practice work.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-sg"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0c02fb55956c7d316 # Amazon Linux 2 (us-east-1) - update per region if needed
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroupIds: [!Ref SecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-instance"

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the instance
    Value: !GetAtt EC2Instance.PublicIp