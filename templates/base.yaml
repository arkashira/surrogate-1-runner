apiVersion: v1
kind: Namespace
metadata:
  name: docker-compose-conversion
---
apiVersion: v1
kind: Service
metadata:
  name: base-service
  namespace: docker-compose-conversion
spec:
  selector:
    app: base-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: base-deployment
  namespace: docker-compose-conversion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: base-app
  template:
    metadata:
      labels:
        app: base-app
    spec:
      containers:
        - name: base-container
          image: nginx:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: base-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: base-storage
          emptyDir: {}