apiVersion: v1
kind: PersistentVolume
metadata:
  name: base-pv
  namespace: docker-compose-conversion
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: base-pvc
  namespace: docker-compose-conversion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi