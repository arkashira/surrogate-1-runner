<!DOCTYPE html>
<html>
<head>
    <title>Public Credential</title>
    <meta name="description" content="View public credential details">
</head>
<body>
    <h1>Public Credential</h1>
    <div>
        <h2>{{ credential.holder.name }}</h2>
        <p>Skill Area: {{ credential.skill_area }}</p>
        <p>Issuance Date: {{ credential.issuance_date }}</p>
        <img src="{{ credential.badge_image }}" alt="Badge Image">
        <button onclick="copyToClipboard('{{ badge_link }}')">Copy Badge Link</button>
    </div>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Badge link copied to clipboard!");
            }, () => {
                alert("Failed to copy badge link.");
            });
        }
    </script>
</body>
</html>
