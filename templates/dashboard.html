<!DOCTYPE html>
<html>
<head>
    <title>GCP Cost Dashboard</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>GCP Cost Dashboard</h1>
    <form method="get">
        <label for="project_id">Project ID:</label>
        <input type="text" id="project_id" name="project_id">
        <label for="resource_type">Resource Type:</label>
        <input type="text" id="resource_type" name="resource_type">
        <button type="submit">Filter</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Project ID</th>
                <th>Resource Type</th>
                <th>Cost</th>
                <th>Currency</th>
                <th>Usage Start Time</th>
                <th>Usage End Time</th>
            </tr>
        </thead>
        <tbody>
            {% for data in cost_data %}
            <tr>
                <td>{{ data.project_id }}</td>
                <td>{{ data.resource_type }}</td>
                <td>{{ data.cost }}</td>
                <td>{{ data.currency }}</td>
                <td>{{ data.usage_start_time }}</td>
                <td>{{ data.usage_end_time }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
