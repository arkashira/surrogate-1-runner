version: 1
name: Twitter Data Ingestion
description: Template for ingesting data from Twitter.
schedule:
  interval: "*/15 * * * *"
source:
  type: "twitter"
  query: "#example"
  count: 100
transform:
  - type: "filter"
    field: "retweet_count"
    operator: ">"
    value: 10
  - type: "extract"
    fields: ["text", "created_at", "retweet_count", "favorite_count"]
sink:
  type: "s3"
  bucket: "twitter-data-bucket"
  path: "twitter-data"