name: "Load Test Configuration"
description: "Read a YAML config and export its keys as environment variables."
inputs:
  config_path:
    description: "Path to the YAML configuration file."
    required: false
    default: "./ci_cd_pipelines/test-config.yml"

runs:
  using: "composite"
  steps:
    - name: Install PyYAML
      run: python -m pip install --quiet pyyaml
      shell: bash

    - name: Export configuration to GITHUB_ENV
      env:
        CONFIG_PATH: ${{ inputs.config_path }}
      run: python "${{ github.action_path }}/read_config.py" "${CONFIG_PATH}"
      shell: bash