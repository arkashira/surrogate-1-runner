groups:
  - name: surrogate-1-health
    interval: 30s
    rules:
      - alert: SurrogateDecisionLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(decision_latency_seconds_bucket[5m])) by (le)) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Surrogate decision latency is high"
          description: "99th percentile decision latency is above 2s for {{ $labels.instance }}"
          runbook_url: "https://axentx.runbooks/surrogate-1/latency"

      - alert: SurrogateDecisionErrorRateHigh
        expr: (sum(rate(decision_error_total[5m])) / sum(rate(decision_success_total[5m])) * 100) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Surrogate decision error rate is high"
          description: "Decision error rate is above 5% for {{ $labels.instance }}"
          runbook_url: "https://axentx.runbooks/surrogate-1/error-rate"

      - alert: SurrogateDecisionErrorRateCritical
        expr: (sum(rate(decision_error_total[5m])) / sum(rate(decision_success_total[5m])) * 100) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Surrogate decision error rate is critical"
          description: "Decision error rate is above 10% for {{ $labels.instance }}"
          runbook_url: "https://axentx.runbooks/surrogate-1/error-rate-critical"