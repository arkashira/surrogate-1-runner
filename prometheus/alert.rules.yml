groups:
  - name: parser_memory_alerts
    rules:
      - alert: HighParserMemoryUsage
        expr: surrogate_parser_memory_bytes > 200 * 1024 * 1024
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected on parser instance"
          description: "The parser memory usage has exceeded 200MB for more than 30 seconds."