# Surrogate-1 configuration
dataset_repo: "axentx/surrogate-1-training-pairs"
workflow_schedule: "0 0 * * *"
max_workers: 16

# SSH key management configuration
ssh_keys:
  path: "/opt/axentx/surrogate-1/auth/ssh_keys/authorized_keys"
  admin_approval: true
  admin_users: ["admin@example.com", "ops@example.com"]
  max_failed_attempts: 5
  alert_email: "security@axentx.com"