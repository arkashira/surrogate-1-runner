version: '1.0'

server:
  host: '0.0.0.0'
  port: 8000

database:
  host: 'localhost'
  port: 5432
  user: 'postgres'
  password: 'password'
  dbname: 'surrogate_1'

audit:
  enabled: true
  table: 'audit_logs'
  log_fields:
    - 'request'
    - 'response'
    - 'timestamp'
    - 'user'
    - 'pattern_version'

environment_variables:
  - 'AUDIT_ENABLED'
  - 'AUDIT_TABLE'
  - 'AUDIT_LOG_FIELDS'