aws-sandbox-template:
  name: "AWS Service Sandbox"
  description: "Pre-configured sandbox with core AWS services for exam practice"
  services:
    - name: "EC2"
      type: "ec2"
      region: "us-east-1"
      instance_type: "t3.micro"
      image_id: "ami-0c55b159cbfafe1d0"
    - name: "S3"
      type: "s3"
      region: "us-east-1"
      bucket_name: "sandbox-bucket-{{uuid}}"
    - name: "RDS"
      type: "rds"
      region: "us-east-1"
      engine: "mysql"
      instance_class: "db.t3.micro"
      database_name: "sandbox_db"
      username: "admin"
      password: "{{random_password}}"
    - name: "Lambda"
      type: "lambda"
      region: "us-east-1"
      runtime: "python3.9"
      handler: "index.lambda_handler"
    - name: "CloudWatch"
      type: "cloudwatch"
      region: "us-east-1"
    - name: "IAM"
      type: "iam"
      region: "us-east-1"
    - name: "VPC"
      type: "vpc"
      region: "us-east-1"
      cidr_block: "10.0.0.0/16"
    - name: "ECS"
      type: "ecs"
      region: "us-east-1"
      cluster_name: "sandbox-cluster"
    - name: "DynamoDB"
      type: "dynamodb"
      region: "us-east-1"
      table_name: "sandbox-table"
    - name: "API Gateway"
      type: "apigateway"
      region: "us-east-1"
      rest_api_name: "sandbox-api"
  timeout_seconds: 30
  reset_after_hours: 24
  reliability_target: "99.9%"