name: Lint and Package Helm Chart

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yamllint
          helm version

      - name: Lint Helm Chart
        run: |
          helm lint ./charts/keep

      - name: Template Helm Chart
        run: |
          helm template ./charts/keep

      - name: Package Helm Chart
        run: |
          helm package ./charts/keep
          ls -l *.tgz