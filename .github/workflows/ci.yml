name: CI Pipeline with Dependency Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          # Add test commands here if present
          echo "Running tests..."
      - name: Dependency Scanning with pip-audit
        run: |
          pip install pip-audit
          pip-audit
          if [ $? -ne 0 ]; then
            echo "CRITICAL: Vulnerabilities found in dependencies. Build failed."
            exit 1
          fi