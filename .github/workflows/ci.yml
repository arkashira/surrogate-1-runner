name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
    - name: Build
      run: |
        source $HOME/.cargo/env
        cargo build --release
    - name: Test
      run: |
        source $HOME/.cargo/env
        cargo test
    - name: Verify Java Removal
      run: |
        if command -v java &> /dev/null; then
          echo "Error: Java is still installed. Please remove it to ensure optimal performance."
          exit 1
        fi