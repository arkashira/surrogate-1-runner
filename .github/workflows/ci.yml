name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Validate logrotate configuration
      run: |
        sudo logrotate -d /etc/logrotate.d/surrogate-1

    - name: Build and test
      run: |
        npm install
        npm test