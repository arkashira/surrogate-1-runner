name: Markdown Code Block Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-markdown-code-blocks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: 11
    - name: Test Markdown Code Blocks
      run: |
        echo "Compiling Java code snippets from markdown files..."
        find docs/collections/ -name "*.md" -exec sh -c '
          for file do
            echo "Processing $file"
            grep -E "