name: Compliance CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit --junitxml=test-results.xml

      - name: Build Docker image
        run: |
          docker build -t surrogate-1-compliance:latest -f Dockerfile.compliance .

      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag surrogate-1-compliance:latest ${{ secrets.DOCKER_REGISTRY }}/surrogate-1-compliance:${{ github.sha }}
          docker push ${{ secrets.DOCKER_REGISTRY }}/surrogate-1-compliance:${{ github.sha }}