name: Performance Benchmark
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pip install pytest pytest-benchmark

      - name: Run benchmarks
        env:
          BENCHMARK_OUTPUT: benchmark_results.json
        run: |
          if [ -f bin/benchmark.sh ]; then
            chmod +x bin/benchmark.sh
            bin/benchmark.sh > $BENCHMARK_OUTPUT
          else
            pytest -m benchmark --benchmark-json $BENCHMARK_OUTPUT
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: ${{ env.BENCHMARK_OUTPUT }}

      - name: Post results as comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync(process.env.BENCHMARK_OUTPUT, 'utf8');
            const commentBody = `## 📊 Performance Benchmark Results\n<details>\n<summary>Click to expand</summary>\n\n\`\`\`json\n${results}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: commentBody
            });