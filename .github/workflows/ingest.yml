- name: Compute shard matrix
  id: matrix
  run: |
    FILE_LIST=$(cat file-list-${{ env.DATE }}.json)
    TOTAL=$(echo "$FILE_LIST" | jq length)
    SHARDS=16
    # Produce JSON array of {shard_id, files} for each shard
    python3 -c "
import json, os, sys
files = json.loads(os.environ['FILE_LIST'])
shards = int(os.environ['SHARDS'])
rows = []
for i in range(shards):
    rows.append({
        'shard_id': i,
        'files': [f for idx, f in enumerate(files) if idx % shards == i]
    })
print(json.dumps(rows))
" > matrix.json
    echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT
  env:
    FILE_LIST: ${{ steps.checkout.outputs.file_list }}  # injected from artifact
    SHARDS: 16
    DATE: ${{ env.DATE }}

- uses: actions/checkout@v4
  with:
    repository: <owner>/surrogate-1-runner
    path: runner

- name: Upload file-list artifact
  uses: actions/upload-artifact@v4
  with:
    name: file-list-${{ env.DATE }}
    path: file-list-${{ env.DATE }}.json