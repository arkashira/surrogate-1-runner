name: 'axentx Compliance Action'
author: axentx
description: 'Runs the surrogate-1 compliance engine on a Terraform plan and reports results to the PR.'

inputs:
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  tf-plan-json:
    description: 'Path to the Terraform plan JSON file'
    required: true
  aws-default-region:
    description: 'AWS region to use (default: us-east-1)'
    required: false
    default: 'us-east-1'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.aws-access-key-id }}
    - ${{ inputs.aws-secret-access-key }}
    - ${{ inputs.tf-plan-json }}
    - ${{ inputs.aws-default-region }}

branding:
  icon: 'shield'
  color: 'blue'