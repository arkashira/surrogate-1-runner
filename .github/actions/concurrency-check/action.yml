name: Concurrency Check
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python environment
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install analyzer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir axentx-analyzer

      - name: Run static code analysis
        run: |
          axentx-analyzer run --config ./.github/config/analyzer.yaml > analyzer_output.log
        continue-on-error: false

      - name: Check for critical issues
        if: ${{ success() }}
        run: |
          if grep -q "CRITICAL" analyzer_output.log; then
            echo "Critical concurrency issues detected. Failing the job."
            exit 1
          fi

      - name: Output analysis summary
        run: |
          echo "::set-output name=analysis_summary::$(cat analyzer_output.log)"