<!DOCTYPE html>
<html>
<head>
    <title>Set Budget Limits</title>
</head>
<body>
    <h1>Set Budget Limits</h1>
    <form method="post">
        <label for="service">Service:</label>
        <input type="text" id="service" name="service" required><br>
        <label for="limit">Limit:</label>
        <input type="number" id="limit" name="limit" step="0.01" required><br>
        <button type="submit">Set Limit</button>
    </form>
    <h2>Current Budget Limits</h2>
    <ul>
        {% for service, limit in budget_limits.items() %}
            <li>{{ service }}: {{ limit }}</li>
        {% endfor %}
    </ul>
</body>
</html>
