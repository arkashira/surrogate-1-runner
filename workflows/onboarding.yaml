name: Engineer Onboarding
description: |
  Standardised onboarding workflow for new engineers.
  The file lives in the repository so every team member can view
  and edit it directly. It is executed by WorkIO (or any compatible
  orchestrator) and creates a GitHub issue, notifies Slack, provisions
  AWS IAM access, and sends a welcome email.

# ------------------------------------------------------------------
# INPUT VARIABLES (must be supplied when the workflow is triggered)
# ------------------------------------------------------------------
variables:
  engineer:
    type: object
    required: true
    properties:
      name:
        type: string
        description: Full name of the new engineer
      github:
        type: string
        description: GitHub username (login)
      email:
        type: string
        description: Corporate email address

# ------------------------------------------------------------------
# WORKFLOW STEPS
# ------------------------------------------------------------------
steps:
  # 1️⃣ Notify the engineering Slack channel
  - id: notify-team
    name: Notify Engineering Slack Channel
    action: slack.post_message
    inputs:
      channel: "#engineering"
      message: |
        :wave: Onboarding started for *{{ engineer.name }}* ({{ engineer.github }}).

  # 2️⃣ Create a tracking issue in the repo
  - id: create-onboarding-issue
    name: Create Onboarding Issue in GitHub
    action: github.create_issue
    inputs:
      repo: axentx/surrogate-1
      title: "Onboarding: {{ engineer.name }} ({{ engineer.github }})"
      body: |
        ## Onboarding Checklist for {{ engineer.name }}

        - [ ] Add to **Engineers** team
        - [ ] Grant repository access to `axentx/surrogate-1`
        - [ ] Provision AWS IAM user
        - [ ] Set up local development environment
        - [ ] Assign a mentor
        - [ ] Complete security & compliance training

        > This issue is automatically generated by the standardized onboarding workflow.
        > Update the checklist as tasks are completed.

  # 3️⃣ Add the engineer to the GitHub “engineers” team
  - id: add-to-engineering-team
    name: Add Engineer to GitHub Team
    action: github.add_team_member
    inputs:
      org: axentx
      team_slug: engineers
      username: "{{ engineer.github }}"

  # 4️⃣ Grant push access to the main repo
  - id: grant-repo-access
    name: Grant Repository Access
    action: github.add_collaborator
    inputs:
      repo: axentx/surrogate-1
      username: "{{ engineer.github }}"
      permission: "push"

  # 5️⃣ Provision an AWS IAM user (no policies attached – add later if needed)
  - id: provision-aws-iam
    name: Provision AWS IAM User
    action: aws.iam_create_user
    inputs:
      username: "{{ engineer.github }}"

  # 6️⃣ Send a friendly welcome email
  - id: send-welcome-email
    name: Send Welcome Email
    action: email.send
    inputs:
      to: "{{ engineer.email }}"
      subject: "Welcome to Axentx, {{ engineer.name }}!"
      body: |
        Hi {{ engineer.name }},

        Welcome to the team! 🎉

        Please check the GitHub issue created for you:
        {{ create-onboarding-issue.outputs.issue_url }}

        Follow the checklist inside, and let us know if you hit any roadblocks.

        Best,
        The Axentx Ops Team