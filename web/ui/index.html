<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surrogate-1 UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Configure Synthetic Metric Patterns</h1>
        <form id="metric-form">
            <label for="metric-name">Metric Name:</label>
            <input type="text" id="metric-name" name="metric-name" required>

            <label for="metric-type">Metric Type:</label>
            <select id="metric-type" name="metric-type" required>
                <option value="counter">Counter</option>
                <option value="gauge">Gauge</option>
                <option value="histogram">Histogram</option>
            </select>

            <label for="value-distribution">Value Distribution:</label>
            <select id="value-distribution" name="value-distribution" required>
                <option value="constant">Constant</option>
                <option value="random">Random</option>
                <option value="sinusoid">Sinusoid</option>
            </select>

            <label for="emission-interval">Emission Interval (seconds):</label>
            <input type="number" id="emission-interval" name="emission-interval" min="1" required>

            <button type="submit">Save Preset</button>
        </form>
    </div>
</body>
</html>
