<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Knowledge Article</title>

  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-..."
    crossorigin="anonymous"
  >

  <style>
    /* Tag container */
    .tag-input {
      display: flex;
      flex-wrap: wrap;
      gap: .25rem;
      padding: .5rem;
      border: 1px solid #ced4da;
      border-radius: .25rem;
      min-height: 38px;
    }
    .tag-input input {
      border: none;
      flex: 1;
      min-width: 120px;
      padding: .25rem .5rem;
    }
    /* Individual tag */
    .tag {
      background-color: #e9ecef;
      border-radius: .25rem;
      padding: .25rem .5rem;
      display: flex;
      align-items: center;
    }
    .tag button {
      margin-left: .25rem;
      background: none;
      border: none;
      font-weight: bold;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
  </style>
</head>
<body class="container py-4">
  <h1 class="mb-4">Create Knowledge Article</h1>

  <form method="post" action="{{ url_for('create_article') }}">
    {{ csrf_token() }}

    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input
        type="text"
        id="title"
        name="title"
        class="form-control"
        required
        placeholder="Enter article title"
      >
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">Content</label>
      <textarea
        id="content"
        name="content"
        class="form-control"
        rows="6"
        required
        placeholder="Write your article here…"
      ></textarea>
    </div>

    <div class="mb-3">
      <label for="tags" class="form-label">Tags (Git commit hashes, Jira issue keys)</label>
      <div id="tags" class="tag-input" data-placeholder="Add a tag…"></div>
      <input type="hidden" name="tags" id="tags-hidden">
    </div>

    <button type="submit" class="btn btn-primary">Save Article</button>
  </form>

  <script>
    (function () {
      const tagContainer = document.getElementById('tags');
      const hiddenInput = document.getElementById('tags-hidden');
      let tags = [];

      // Render tags in the UI and update hidden input
      function render() {
        tagContainer.innerHTML = '';
        tags.forEach(tag => {
          const span = document.createElement('span');
          span.className = 'tag';
          span.textContent = tag;

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.setAttribute('aria-label', `Remove tag ${tag}`);
          btn.innerHTML = '&times;';
          btn.onclick = () => {
            tags = tags.filter(t => t !== tag);
            render();
          };

          span.appendChild(btn);
          tagContainer.appendChild(span);
        });

        hiddenInput.value = tags.join(',');
      }

      // Input element for new tags
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = tagContainer.dataset.placeholder;
      input.setAttribute('aria-label', 'Add a tag');
      input.addEventListener('keydown', e => {
        if (['Enter', ',', ' '].includes(e.key)) {
          e.preventDefault();
          const val = input.value.trim();
          if (val && !tags.includes(val)) {
            tags.push(val);
            render();
          }
          input.value = '';
        }
      });

      tagContainer.appendChild(input);
      render();
    })();
  </script>
</body>
</html>
