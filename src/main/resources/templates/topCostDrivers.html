<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Top Cost Drivers</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
        .card h3 { margin: 0 0 0.5rem 0; }
        .card p { margin: 0.25rem 0; }
        @media (max-width: 600px) {
            .card { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<h1>Top Cost Drivers</h1>

<div th:if="${topDrivers == null or #lists.isEmpty(topDrivers)}">
    <p>No cost driver data available.</p>
</div>

<div th:each="driver : ${topDrivers}">
    <div class="card">
        <h3 th:text="${driver.vmType} + ' in ' + ${driver.region}"></h3>
        <p th:text="'Total Cost: ' + ${driver.totalCostFormatted}"></p>
        <p th:text="'Instances: ' + ${driver.instanceCount}"></p>
    </div>
</div>
</body>
</html>
