<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Young Investor Financial Profile</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/profile.js" defer></script>
</head>
<body>
  <h1>Set Up Your Financial Profile</h1>
  <form id="financial-profile-form" action="/profile/submit" method="post">
    <fieldset>
      <legend>Personal Information</legend>
      <label for="fullName">Full Name:</label>
      <input type="text" id="fullName" name="fullName" required>

      <label for="dateOfBirth">Date of Birth:</label>
      <input type="date" id="dateOfBirth" name="dateOfBirth" required>
    </fieldset>

    <fieldset>
      <legend>Financial Situation</legend>
      <label for="annualIncome">Annual Income (USD):</label>
      <input type="number" id="annualIncome" name="annualIncome" min="0" required>

      <label for="existingInvestments">Existing Investments (USD):</label>
      <input type="number" id="existingInvestments" name="existingInvestments" min="0" required>

      <label for="riskTolerance">Risk Tolerance:</label>
      <select id="riskTolerance" name="riskTolerance" required>
        <option value="">--Select--</option>
        <option value="conservative">Conservative</option>
        <option value="moderate">Moderate</option>
        <option value="aggressive">Aggressive</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Investment Goals</legend>
      <label for="goalAmount">Goal Amount (USD):</label>
      <input type="number" id="goalAmount" name="goalAmount" min="0" required>

      <label for="timeHorizon">Time Horizon (years):</label>
      <input type="number" id="timeHorizon" name="timeHorizon" min="1" required>
    </fieldset>

    <button type="submit">Save Profile</button>
  </form>
</body>
</html>
