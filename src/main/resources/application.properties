# ----------------------------------------------------------------------
# ── 1️⃣  Core Spring Boot settings
# ----------------------------------------------------------------------
spring.application.name=surrogate-1
spring.profiles.active=prod          # change to dev locally

# ----------------------------------------------------------------------
# ── 2️⃣  PostgreSQL datasource – cost‑optimization data warehouse
# ----------------------------------------------------------------------
# Use a dedicated, internal DB for cost data.  Credentials are kept out of
# source control – they are injected from environment variables (see § ⚙️
# “Externalising secrets”).  The URL, driver and pool settings are the same
# for every profile; only the credentials differ.
spring.datasource.url=jdbc:postgresql://cost-db.internal:5432/cost_optimization
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP – the default connection pool used by Spring Boot
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000      # 30 s
spring.datasource.hikari.idle-timeout=600000           # 10 min
spring.datasource.hikari.max-lifetime=1800000          # 30 min

# ----------------------------------------------------------------------
# ── 3️⃣  JPA / Hibernate
# ----------------------------------------------------------------------
# The service only reads cost‑data; we never want the app to alter the
# schema automatically in production.  Use `none` for prod, but keep
# `update` for a local dev profile so that developers can evolve the
# model without manual DDL.
spring.jpa.hibernate.ddl-auto=${spring.jpa.hibernate.ddl-auto:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------------------
# ── 4️⃣  Cost‑data processing (internal batch job)
# ----------------------------------------------------------------------
# These values drive the background job that pulls raw cost rows,
# aggregates them, and stores the result for the recommendation engine.
recommendations.cost-data.batch-size=1000
recommendations.cost-data.refresh-interval=3600000   # 1 h (ms)

# ----------------------------------------------------------------------
# ── 5️⃣  Recommendation service (external micro‑service)
# ----------------------------------------------------------------------
# The service that actually computes optimisation suggestions.
recommendation.service.endpoint=https://optimize.internal/api/v1/recommendations
recommendation.service.poll-interval=300            # seconds between polls

# ----------------------------------------------------------------------
# ── 6️⃣  Dashboard integration
# ----------------------------------------------------------------------
dashboard.base-url=https://dashboard.internal/axentx/surrogate-1
dashboard.enabled=true                               # toggle UI exposure

# ----------------------------------------------------------------------
# ── 7️⃣  Logging
# ----------------------------------------------------------------------
logging.level.com.axentx.surrogate=INFO
logging.level.org.hibernate.SQL=ERROR                # keep DB noise low

# ----------------------------------------------------------------------
# ── 8️⃣  Miscellaneous / future‑proofing
# ----------------------------------------------------------------------
# Turn on actuator health checks (useful for k8s / Docker liveness probes)
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics

# ----------------------------------------------------------------------
# End of file
# ----------------------------------------------------------------------