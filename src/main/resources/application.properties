# /opt/axentx/surrogate-1/src/main/resources/application.properties
# ------------------------------------------------------------------
# Application configuration for surrogate‑1
# ------------------------------------------------------------------

# ------------------------------------------------------------------
# Email notification settings (cost‑budget alerts)
# ------------------------------------------------------------------
# Designated recipient for budget‑exceed alerts
alert.email.recipient=alerts@example.com

# Sender address used when sending alerts
alert.email.from=surrogate-1@example.com

# Enable/disable email alerts (set to true in production)
alert.email.enabled=true

# ------------------------------------------------------------------
# Spring Mail (JavaMailSender) configuration
# ------------------------------------------------------------------
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=surrogate-1
# Store the password in a secure vault or environment variable
# e.g., export SPRING_MAIL_PASSWORD=your‑secure‑token
spring.mail.password=${SPRING_MAIL_PASSWORD:CHANGE_ME}

# Additional SMTP properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ------------------------------------------------------------------
# Optional: graceful fallback if SMTP is unreachable
# ------------------------------------------------------------------
# If the SMTP server cannot be reached within the timeout, the
# application will log the failure and continue running.  This
# prevents a single notification failure from bringing down the
# service.
spring.mail.test-connection=false

# ------------------------------------------------------------------
# Other existing application properties (placeholder)
# ------------------------------------------------------------------
# (Any pre‑existing configuration entries remain unchanged.)