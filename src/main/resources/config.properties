# /opt/axentx/surrogate-1/src/main/resources/config.properties
# Surrogate-1 Configuration
# This file configures the dataset ingestion workflow. Most settings use sensible defaults.
# Adjust only the values that differ from your environment.

# Dataset Source
surrogate-1.dataset.base-url=https://your-dataset-repo.com/datasets
surrogate-1.dataset.bucket-name=public-dataset
surrogate-1.dataset.schema=public-dataset-schema.json

# Workflow Settings
surrogate-1.workflow.max-workers=16
surrogate-1.workflow.interval=30m
surrogate-1.workflow.dispatch-trigger=workflow_dispatch

# Storage (S3)
surrogate-1.storage.s3.endpoint=https://s3.example.com
surrogate-1.storage.s3.bucket=your-storage-bucket
surrogate-1.storage.s3.access-key=YOUR_ACCESS_KEY
surrogate-1.storage.s3.secret-key=YOUR_SECRET_KEY

# Logging
surrogate-1.logging.level=INFO
surrogate-1.logging.file-path=/var/log/surrogate-1.log