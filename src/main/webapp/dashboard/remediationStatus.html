<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remediation Status Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #2c3e50; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .status-success { color: green; font-weight: bold; }
        .status-failure { color: red; font-weight: bold; }
        .status-pending { color: orange; font-weight: bold; }
        #errorMsg { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Automated Remediation Status</h1>
    <div id="lastUpdated">Last updated: <span id="timestamp">-</span></div>
    <table id="remediationTable">
        <thead>
            <tr>
                <th>Vulnerability ID</th>
                <th>Description</th>
                <th>Remediation Action</th>
                <th>Status</th>
                <th>Executed At</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be populated by JavaScript -->
        </tbody>
    </table>
    <div id="errorMsg"></div>

    <script>
        // Endpoint that returns remediation status as JSON.
        const API_ENDPOINT = '/api/remediation/status';

        // Helper to format ISO timestamps.
        function formatTimestamp(ts) {
            if (!ts) return '-';
            const d = new Date(ts);
            return d.toLocaleString();
        }

        // Render a single row in the table.
        function renderRow(item) {
            const tr = document.createElement('tr');

            const tdId = document.createElement('td');
            tdId.textContent = item.vulnId || '-';
            tr.appendChild(tdId);

            const tdDesc = document.createElement('td');
            tdDesc.textContent = item.description || '-';
            tr.appendChild(tdDesc);

            const tdAction = document.createElement('td');
            tdAction.textContent = item.action || '-';
            tr.appendChild(tdAction);

            const tdStatus = document.createElement('td');
            tdStatus.textContent = item.status || 'UNKNOWN';
            if (item.status === 'SUCCESS') tdStatus.classList.add('status-success');
            else if (item.status === 'FAILURE') tdStatus.classList.add('status-failure');
            else if (item.status === 'PENDING') tdStatus.classList.add('status-pending');
            tr.appendChild(tdStatus);

            const tdExecuted = document.createElement('td');
            tdExecuted.textContent = formatTimestamp(item.executedAt);
            tr.appendChild(tdExecuted);

            const tdDetails = document.createElement('td');
            if (item.detailsUrl) {
                const a = document.createElement('a');
                a.href = item.detailsUrl;
                a.textContent = 'View';
                a.target = '_blank';
                tdDetails.appendChild(a);
            } else {
                tdDetails.textContent = '-';
            }
            tr.appendChild(tdDetails);

            return tr;
        }

        // Fetch data and populate the table.
        async function loadRemediationStatus() {
            try {
                const resp = await fetch(API_ENDPOINT, { cache: 'no-store' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                // Update timestamp
                document.getElementById('timestamp').textContent = formatTimestamp(data.generatedAt);

                const tbody = document.querySelector('#remediationTable tbody');
                tbody.innerHTML = ''; // clear existing rows

                if (Array.isArray(data.remediations) && data.remediations.length) {
                    data.remediations.forEach(item => {
                        tbody.appendChild(renderRow(item));
                    });
                } else {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.colSpan = 6;
                    td.textContent = 'No remediation records found.';
                    td.style.textAlign = 'center';
                    tr.appendChild(td);
                    tbody.appendChild(tr);
                }
            } catch (err) {
                console.error('Failed to load remediation status:', err);
                document.getElementById('errorMsg').textContent = 'Error loading remediation status. See console for details.';
            }
        }

        // Auto-refresh every 30 seconds.
        loadRemediationStatus();
        setInterval(loadRemediationStatus, 30000);
    </script>
</body>
</html>
