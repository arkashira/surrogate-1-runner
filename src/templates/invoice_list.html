<!DOCTYPE html>
<html>
<head>
    <title>Invoices</title>
</head>
<body>
    <h1>Invoices</h1>
    <ul>
        {% for invoice in invoices %}
        <li>
            <a href="{{ url_for('invoice_summary.invoice_summary', invoice_id=invoice.id) }}">
                Invoice #{{ invoice.id }} - {{ invoice.vendor_name }}
            </a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
