apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrogate-1
spec:
  template:
    spec:
      containers:
        - name: surrogate-1
          # Existing image, resources, etc. are defined elsewhere.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 1