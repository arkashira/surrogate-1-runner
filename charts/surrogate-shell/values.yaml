# Default values for surrogate-shell
replicaCount: 1

image:
  repository: axentx/surrogate-shell
  tag: latest
  pullPolicy: IfNotPresent

oidc:
  clientId: ""
  clientSecret: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []